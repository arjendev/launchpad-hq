name: Release & Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run build
      - run: npm run test

      # Package the tarball for the GitHub Release asset
      - run: npm pack

      # Create a GitHub Release with auto-generated notes and attach the tarball
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" *.tgz --generate-notes

      # Publish to npm using trusted publishers (OIDC — no NPM_TOKEN needed)
      - run: npm publish --provenance --access public
